# Spring REST API things
spring.application.name=avyBuddy
server.port=8080
server.addresses=127.0.0.1

# Hibernate 6 Community SQLite Dialect for spring integration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true

# Database location and driver
spring.datasource.url=jdbc:sqlite:/opt/avyBuddy/data/avyBuddy.db
spring.datasource.driver-class-name=org.sqlite.JDBC
