#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    # gzip  on;

    map $uri $valid_region {
        default 0;
        "~/routes/(?i)salt-lake$" 1; # Weird stuff for case-insensitivty after the (?i)
        "~/routes/(?i)skyline$" 1;
        "~/routes/(?i)provo$" 1;
        "~/routes/(?i)uintas$" 1;
        "~/routes/(?i)ogden$" 1;
        "~/routes/(?i)logan$" 1;
        "~/routes/(?i)moab$" 1;
        "~/routes/(?i)abajos$" 1;
        "~/routes/(?i)southwest$" 1;
    }

    server {
        listen       80;
        server_name  localhost;
        root   "C:/Users/ka7nq/webProjects/avyBuddy/src/main/web";
        index  index.html index.htm;

        #access_log  logs/host.access.log  main;

        location /routes/ { # Checks end of url path for routes to see if it is valid, 404s if not
                            # valid paths determined by the mapping above
            error_page 404 /routes404.html;

            if ($valid_region = 0){
                return 404;
            }

            rewrite ^ /routes.html break;
        }

        location /apis/ {
            proxy_pass http://localhost:8080/;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
